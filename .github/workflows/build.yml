name: Build GeoFiles

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/README.md"

permissions:
  contents: write

jobs:
  build:
    name: Build geosite & geoip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout geosite builder
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: community/go.mod
          cache: true
          cache-dependency-path: community/go.sum

      - name: Build geosite.dat
        run: |
          set -euo pipefail
          mkdir -p release
          
          pushd community >/dev/null
          # Флаг -datapath=../data заставляет компилятор игнорировать стандартные
          # списки v2fly и собирать .dat файл ИСКЛЮЧИТЕЛЬНО из твоей папки data/
          go run ./ -datapath=../data -outputdir=../release
          popd >/dev/null
          
          mv release/dlc.dat release/geosite.dat
          sha256sum release/geosite.dat > release/geosite.dat.sha256sum

      - name: Install geoip tool
        run: |
          go install github.com/Loyalsoldier/geoip@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build geoip.dat
        run: |
          set -euo pipefail
          mkdir -p source release
          
          # Генерируем строгий конфиг, который отключает скачивание баз MaxMind
          # и парсит только твои текстовые списки из папки source/
          cat << 'EOF' > config.json
          {
            "input": [
              {
                "type": "text",
                "action": "add",
                "args": {
                  "inputDir": "./source"
                }
              }
            ],
            "output": [
              {
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "outputDir": "./release",
                  "outputName": "geoip.dat"
                }
              }
            ]
          }
          EOF
          
          geoip convert -c config.json
          sha256sum release/geoip.dat > release/geoip.dat.sha256sum

      - name: Commit and push generated files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "noreply@github.com"

          git add release/geosite.dat
          git add release/geosite.dat.sha256sum
          git add release/geoip.dat
          git add release/geoip.dat.sha256sum

          git commit -m "Update Xray GeoFiles" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
